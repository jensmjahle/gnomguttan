name: PR Check

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Validate Docker Compose
        run: docker compose config > /dev/null

      - name: Build Docker image
        run: docker build --pull --tag gnomguttan:pr-check .

      - name: Verify Docker runtime config
        run: |
          docker run --rm gnomguttan:pr-check node --check server/index.js
          docker run --rm gnomguttan:pr-check node --check server/mongo.js
          docker run --rm gnomguttan:pr-check node --check server/runtime.js
